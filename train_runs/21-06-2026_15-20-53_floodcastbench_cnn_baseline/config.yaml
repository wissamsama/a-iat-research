experiment:
  name: floodcastbench_cnn_baseline
  seed: 42
  output_dir: train_runs
dataset:
  name: floodcastbench
  task: water_depth_forecasting
  root: data/FloodCastBench
  event: Australia flood
  fidelity: high
  resolution: 30m
  input_window: 5
  horizon: 20
  split_ratios:
    train: 0.7
    val: 0.15
    test: 0.15
  normalization: none
loader:
  batch_size: 1
  num_workers: 0
  pin_memory: false
model:
  name: flood_cnn_baseline
  input_window: 5
  base_channels: 16
training:
  epochs: 1
  learning_rate: 0.0001
  weight_decay: 1.0e-05
  loss: mse
  device: auto
  save_best: true
  early_stopping_patience: 3
evaluation:
  gammas:
  - 0.001
  - 0.01
  evaluate_test_after_training: true
