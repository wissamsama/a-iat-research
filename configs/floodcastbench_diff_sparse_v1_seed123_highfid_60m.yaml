# DIFF-SPARSE v1 for FloodCastBench (Islam et al., AAAI 2026 adaptation).
# Faithful to the paper unless noted: beta_end=1.0 (Table 2, terminal SNR = 0),
# noise masking (Algorithm 1), conditional UNet with cross-attention (Table 3),
# one-step training + autoregressive rollout evaluation (Algorithm 2).
# Deviations from the paper are marked with "DEVIATION".

experiment:
  name: fcb_diff_sparse_v1_seed123_highfid_60m
  seed: 123

paths:
  dataset_root: /home/wissam/utem-workspace/data/FloodCastBench
  experiment_root: /home/wissam/utem-workspace/experiments/FloodCastBench
  checkpoint_root: /home/wissam/utem-workspace/checkpoints/FloodCastBench
  log_root: /home/wissam/utem-workspace/logs/FloodCastBench

dataset:
  name: floodcastbench
  task: diff_sparse_v1_autoregressive
  fidelity: high
  event: australia
  resolution: 60m
  # context 12 + prediction 8 = 20-frame windows: split frame ranges stay
  # identical to the canonical 116/14/14 non-overlapping FNO+ windows.
  context_length: 12
  prediction_length: 8
  train_stride: 1        # sliding train windows inside the train frame range (2301 windows)
  eval_stride: 20        # canonical non-overlapping val/test windows (14 each)
  split_counts:
    train: 116
    val: 14
    test: 14
  patch_size: 64         # paper D=64 patch configuration
  include_dem: true
  include_rainfall: true # DEVIATION: rainfall forcing added as context channels (dense, exogenous)
  include_covariates: true
  covariate_time_scale: 864000.0

masking:
  missing_rate: 0.0      # degree of sparsity: 0.0 dense, 0.5, 0.95 (paper levels)
  mask_mode: noise       # paper Algorithm 1 noise masking ('zeros' = paper ablation baseline)
  eval_mask_bank_size: 10  # paper protocol: 10 fixed masks applied round-robin at eval
  eval_mask_seed: 1234

normalization:
  fit_split: train
  method: standardization
  # Single shared water statistic for context AND targets (no retargeting needed);
  # DEM and rainfall standardized separately (paper standardizes elevation separately).
  min_std: 0.000001

model:
  name: diff_sparse_v1
  context_conv_channels: [16, 32, 64]   # paper Table 3 (D=64)
  context_embedding_dim: 32             # paper Table 3
  covariate_dim: 16
  unet_channels: [16, 32, 32, 64]       # paper Table 3
  resnet_layers_per_block: 2            # paper Table 3
  cross_attention_blocks: 2             # paper Table 3 (2 deepest levels + mid)
  attention_heads: 4
  groupnorm_groups: 8                   # paper Table 3
  time_embedding_dim: 128
  # DEVIATION: 'cross_attention_concat' also concatenates the context embedding to
  # the UNet input for spatial grounding; set 'cross_attention' for the
  # paper-faithful attention-only conditioning.
  conditioning: cross_attention_concat

diffusion:
  steps: 20              # paper Table 2
  beta_schedule: linear
  beta_start: 0.0001     # paper Table 2
  beta_end: 1.0          # paper Table 2 — terminal SNR exactly 0; fixes the
                         # beta_end=0.02 truncated-schedule bug found in the
                         # dense sanity baseline audit (sampling from N(0,I)
                         # now matches the training distribution).
  prediction_type: x0    # paper x-parameterization

loader:
  batch_size: 32         # paper Table 2
  num_workers: 4
  pin_memory: true

training:
  epochs: 40             # paper Table 2
  learning_rate: 0.001   # paper Table 2
  lr_policy: reduce_on_plateau
  lr_patience: 3         # paper Table 2
  lr_factor: 0.5         # paper Table 2
  weight_decay: 0.0
  grad_clip_norm: 1.0
  selection_metric: val_loss
  val_seed: 1234         # fixed val RNG so val_loss is comparable across epochs
  device: auto
  seed: 123

evaluation:
  num_scenarios_val: 2   # paper Table 2
  num_scenarios_test: 8  # paper Table 2
  rollout_remask: true   # re-mask model samples appended to the rollout context
                         # so inference context matches the training distribution
  clip_x0: false
  metrics: [nrmse, nacrps, rmse, mae]

scientific:
  status: diff_sparse_v1_floodcastbench
  does_not_claim:
    - official FloodCastBench benchmark performance
    - official DIFF-SPARSE TideWatch reproduction
    - superiority over persistence or FNO+ until evaluated
    - uncertainty calibration
