experiment:
  name: floodcastbench_cnn_baseline_normalized
  seed: 42
  output_dir: train_runs

dataset:
  name: floodcastbench
  task: water_depth_forecasting
  root: data/FloodCastBench
  event: Australia flood
  fidelity: high
  resolution: 30m
  input_window: 5
  horizon: 20
  split_ratios:
    train: 0.70
    val: 0.15
    test: 0.15
  normalization:
    mode: standard
    stats_path: outputs/floodcastbench_normalization/water_depth_australia_30m_train_input5_h20_stats.json

loader:
  batch_size: 1
  num_workers: 0
  pin_memory: false

model:
  name: flood_cnn_baseline
  input_window: 5
  base_channels: 16
  output_activation: identity
  final_bias_init: null

training:
  epochs: 5
  learning_rate: 0.0001
  weight_decay: 0.00001
  loss: mse
  device: auto
  save_best: true
  early_stopping_patience: 3

evaluation:
  gammas: [0.001, 0.01]
  evaluate_test_after_training: true
