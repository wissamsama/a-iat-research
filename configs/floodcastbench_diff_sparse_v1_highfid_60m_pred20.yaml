# DIFF-SPARSE v1 eval-only long-horizon config.
# Same trained model contract as floodcastbench_diff_sparse_v1_highfid_60m.yaml:
# context_length stays 12 and one-step reverse sampling is rolled out
# autoregressively. Only prediction_length is extended to inspect h13..h32.

experiment:
  name: fcb_diff_sparse_v1_highfid_60m_pred20
  seed: 42

paths:
  dataset_root: /home/wissam/utem-workspace/data/FloodCastBench
  experiment_root: /home/wissam/utem-workspace/experiments/FloodCastBench
  checkpoint_root: /home/wissam/utem-workspace/checkpoints/FloodCastBench
  log_root: /home/wissam/utem-workspace/logs/FloodCastBench

dataset:
  name: floodcastbench
  task: diff_sparse_v1_autoregressive_eval_pred20
  fidelity: high
  event: australia
  resolution: 60m
  context_length: 12
  prediction_length: 20
  train_stride: 1
  eval_stride: 20
  # Split frame boundaries remain the canonical 116/14/14 x 20-frame ranges.
  # Because windows are now 32 frames long, the number of fitting val/test
  # windows is expected to be lower than 14 and is reported by the evaluator.
  split_counts:
    train: 116
    val: 14
    test: 14
  patch_size: 64
  include_dem: true
  include_rainfall: true
  include_covariates: true
  covariate_time_scale: 864000.0

masking:
  missing_rate: 0.0
  mask_mode: noise
  eval_mask_bank_size: 10
  eval_mask_seed: 1234

normalization:
  fit_split: train
  method: standardization
  min_std: 0.000001

model:
  name: diff_sparse_v1
  context_conv_channels: [16, 32, 64]
  context_embedding_dim: 32
  context_groupnorm_groups: 8
  unet_channels: [16, 32, 32, 64]
  resnet_layers_per_block: 2
  cross_attention_blocks: 2
  groupnorm_groups: 16
  dropout: 0.0

diffusion:
  steps: 20
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 1.0
  prediction_type: x0

loader:
  batch_size: 32
  num_workers: 4
  pin_memory: true

training:
  epochs: 161
  learning_rate: 0.001
  lr_policy: reduce_on_plateau
  lr_patience: 3
  lr_factor: 0.5
  weight_decay: 0.0
  grad_clip_norm: 1.0
  selection_metric: val_loss
  val_seed: 1234
  device: auto
  seed: 42

evaluation:
  num_scenarios_val: 2
  num_scenarios_test: 8
  rollout_remask: false
  clip_x0: false
  metrics: [nrmse, nacrps, rmse, mae]

scientific:
  status: diff_sparse_v1_floodcastbench_eval_only_pred20
  does_not_claim:
    - official FloodCastBench benchmark performance
    - official DIFF-SPARSE TideWatch reproduction
    - superiority over persistence or FNO+ until evaluated
    - uncertainty calibration
