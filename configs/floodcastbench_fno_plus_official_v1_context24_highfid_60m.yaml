experiment:
  name: fcb_fno_plus_official_v1_context24_highfid_60m
paths:
  dataset_root: /home/wissam/utem-workspace/data/FloodCastBench
  experiment_root: /home/wissam/utem-workspace/experiments/FloodCastBench
  checkpoint_root: /home/wissam/utem-workspace/checkpoints/FloodCastBench
  log_root: /home/wissam/utem-workspace/logs/FloodCastBench
dataset:
  name: floodcastbench
  task: fno_plus_official_reproduction_attempt_v1_context24
  fidelity: high
  event: australia
  resolution: 60m
  sample_length: 20      # unchanged: 1 "current" frame + 19 target frames
  context_length: 24     # NEW: matches DIFF-SPARSE v2's context_length=24 (see
                          # reports/fno_plus_beat_paper_plan.md WPB0) -- window
                          # grows to context_length + sample_length = 44 frames.
  stride: 44              # non-overlapping windows at the new window length
                          # (was 20, matching the old window length of 20).
  split_counts:
    # Total non-overlapping 44-frame windows on 2881 Australia-60m frames:
    # floor((2881-44)/44)+1 = 65. Same train/val/test proportions as the
    # vanilla split (116/14/14 out of 144), rounded: 52/6/7 (sums to 65).
    train: 52
    val: 6
    test: 7
normalization:
  fit_split: train
  method: standardization
  min_std: 1.0e-06
  normalize_input_channels:
  - initial_depth
  - dem
  - rainfall
  normalize_target: true
  leave_unchanged:
  - x_coordinate
  - y_coordinate
  - t_coordinate
model:
  name: fno_plus_official_v1_context24
  input_channels: 6
  modes: 12               # T=44 -> 23 effective rFFT modes (T//2+1), so
                          # modes=12 no longer truncates (was 11/12 at T=20).
  width: 20
  fourier_layers: 4
  output_steps: 19
  output_offset: 25       # context_length + 1: skip the 24 history frames
                          # plus the "current" frame, predict the next 19.
loader:
  batch_size: 1
  num_workers: 2
  pin_memory: true
training:
  epochs: 100
  learning_rate: 0.001
  betas:
  - 0.9
  - 0.999
  weight_decay: 0.0001
  scheduler: cosine
  min_learning_rate: 0.0
  loss: mse_on_normalized_target
  selection_metric: val_current_relative_rmse
  device: auto
  seed: 42
evaluation:
  metric_units: physical_after_inverse_transform
  gammas:
  - 0.001
  - 0.01
