# DIFF-SPARSE v1 for FloodCastBench (Islam et al., AAAI 2026 adaptation).
#
# Rebuilt 2026-07-05 to match the official reference implementation
# (github.com/KAI10/Diff-Sparse) after cloning and reading it directly, not
# just the paper prose. Three previously-undiscovered architectural facts,
# confirmed by reading diffusion.py / hidden_state_net.py / lightning_training.py
# / lightning_diffusion.py:
#   1. Conditioning is a TEMPORAL token sequence (one heavily-pooled spatial
#      summary per context timestep, fed as encoder_hidden_states), not a
#      pixel-aligned spatial map. models/diff_sparse_v1.py's
#      TemporalContextEncoder replicates hidden_state_net.py's unpadded
#      Conv3d+AvgPool3d stack exactly.
#   2. The UNet is diffusers.UNet2DConditionModel with cross-attention at the
#      2 MIDDLE levels (DownBlock2D, CrossAttn, CrossAttn, DownBlock2D), each
#      combining self- and cross-attention (only_cross_attention=False,
#      diffusers' default) -- not the 2 deepest or 2 shallowest levels, and
#      not cross-attention-only.
#   3. The reverse-diffusion noise variance uses raw beta_t ("Option 1" in
#      diffusion.py), not the tighter beta-tilde posterior variance (its
#      "Option 2", left commented out in the reference).
# All 3 are now implemented exactly. Remaining deviations are marked "DEVIATION".

experiment:
  name: fcb_diff_sparse_v1_seed7_highfid_60m
  seed: 7

paths:
  dataset_root: /home/wissam/utem-workspace/data/FloodCastBench
  experiment_root: /home/wissam/utem-workspace/experiments/FloodCastBench
  checkpoint_root: /home/wissam/utem-workspace/checkpoints/FloodCastBench
  log_root: /home/wissam/utem-workspace/logs/FloodCastBench

dataset:
  name: floodcastbench
  task: diff_sparse_v1_autoregressive
  fidelity: high
  event: australia
  resolution: 60m
  # Paper Table 2 / reference training_config.py: context 12, val/test
  # prediction length 12 -> 24-frame windows. Split frame ranges stay the
  # canonical FNO+ ones (train [0,2320), val [2320,2600), test [2600,2881));
  # only the eligible window count changes: 2297 train (stride 1), 13 val /
  # 13 test (stride 20, full-fit windows only, same eligibility discipline as
  # the pred20/h216 extension configs).
  context_length: 12
  prediction_length: 12
  train_stride: 1        # sliding train windows inside the train frame range (2297 windows)
  eval_stride: 20        # canonical window start positions (13 eligible per split)
  split_counts:
    train: 116
    val: 14
    test: 14
  patch_size: 64         # paper D=64 patch configuration
  include_dem: true
  include_rainfall: true # DEVIATION: rainfall forcing added as a context channel (dense,
                         # exogenous, varies per timestep like water). FloodCastBench is
                         # rain-driven; the reference's TideWatch domain is tidal and has
                         # no equivalent channel.
  include_covariates: true
  covariate_time_scale: 864000.0

masking:
  missing_rate: 0.0      # degree of sparsity: 0.0 dense, 0.5, 0.95 (paper levels)
  mask_mode: noise       # paper Algorithm 1 noise masking ('zeros' = paper ablation baseline)
  eval_mask_bank_size: 10  # paper protocol: 10 fixed masks applied round-robin at eval
  eval_mask_seed: 1234

normalization:
  fit_split: train
  method: standardization
  # Single shared water statistic for context AND targets (no retargeting needed);
  # DEM and rainfall standardized separately (paper standardizes elevation separately).
  min_std: 0.000001

model:
  name: diff_sparse_v1
  # TemporalContextEncoder (hidden_state_net.py equivalent): unpadded Conv3d
  # stack over [masked water, DEM, sensor mask, (rainfall)] x context_length.
  context_conv_channels: [16, 32, 64]   # reference d1/d2/d3 channel counts
  context_embedding_dim: 32             # reference spatial_embedding_size (D=64 row)
  context_groupnorm_groups: 8           # reference HiddenStateNet num_groups
  # UNet2DConditionModel (diffusion.py get_conditional_unet): block_out_channels,
  # layers_per_block, and cross_attention_dim (== context_embedding_dim above)
  # all match the reference's D=64 configuration exactly.
  unet_channels: [16, 32, 32, 64]
  resnet_layers_per_block: 2
  cross_attention_blocks: 2             # -> down/up_block_types = (Down, CrossAttn,
                                         # CrossAttn, Down), the reference's exact layout
  groupnorm_groups: 16                  # reference UNet2DConditionModel norm_num_groups
  dropout: 0.0

diffusion:
  steps: 20              # paper Table 2
  beta_schedule: linear
  beta_start: 0.0001     # paper Table 2
  beta_end: 1.0          # paper Table 2 — terminal SNR exactly 0; fixes the
                         # beta_end=0.02 truncated-schedule bug found in the
                         # dense sanity baseline audit (sampling from N(0,I)
                         # now matches the training distribution).
  prediction_type: x0    # paper x-parameterization

loader:
  batch_size: 32         # paper Table 2
  num_workers: 4
  pin_memory: true

training:
  epochs: 300            # DEVIATION from paper Table 2's 40 epochs AND from the
                         # earlier 161-epoch FNO+ gradient-step-parity target
                         # (100 FNO+ epochs x 116 windows, batch=1 = 11,600 steps).
                         # Raised 2026-07-05 after confirming (single-batch
                         # diagnostic: fixed t=0 converges to loss~0.0007 in 300
                         # steps, cleanly, proving the architecture/gradient flow
                         # are correct; random-t -- matching real training --
                         # only reaches ~0.17 in the same 300 steps, clearly
                         # still falling) that this conditioning mechanism (no
                         # concat shortcut) needs substantially more optimization
                         # time than 161 epochs (11,592 steps) provides to
                         # converge on the full random-timestep objective. A
                         # 70-epoch real-data pilot at LR pinned to 1e-3 (patience
                         # 15, never reduced) showed val_loss still improving,
                         # just slowly, through epoch 70 with no sign of a hard
                         # ceiling. 300 epochs ~ 21,600 gradient steps, no longer
                         # FNO+-comparable by construction -- accepted trade-off,
                         # chosen explicitly over further piloting.
                         # See reports/diff_sparse_v1_fno_plus_training_protocol.md.
  learning_rate: 0.001   # paper Table 2
  lr_policy: reduce_on_plateau
  lr_patience: 15        # DEVIATION from paper Table 2 (patience: 3). Verified
                         # empirically that this is tied to the validation
                         # metric, not the attention mechanism: two 40-60 epoch
                         # pilots under the current (reference-matching)
                         # diffusers.UNet2DConditionModel architecture both
                         # plateaued at patience=3 (train_loss stuck ~0.43-0.49,
                         # LR crushed to 2.5e-4 by epoch 40) -- the same failure
                         # signature as the earlier, structurally different
                         # hand-rolled pixel-cross-attention architecture. The
                         # reference's own scheduler watches full-rollout
                         # val_masked_nrmse (expensive: real DDPM ancestral
                         # sampling every val epoch); this repo uses a cheaper
                         # one-step denoising MSE proxy for val_loss (item 9,
                         # reports/diff_sparse_v1_design.md), which is plausibly
                         # noisier/less monotone and needs more patience to
                         # avoid the LR collapsing before the plateau breaks,
                         # independent of which conditioning mechanism is used.
  lr_factor: 0.5         # paper Table 2
  weight_decay: 0.0
  grad_clip_norm: 1.0    # DEVIATION: not in the paper (Algorithm 1 takes a plain
                         # gradient step); kept as a conservative stability guard.
  selection_metric: val_loss
  val_seed: 1234         # fixed val RNG so val_loss is comparable across epochs
  device: auto
  seed: 7

evaluation:
  num_scenarios_val: 2   # paper Table 2
  num_scenarios_test: 8  # paper Table 2
  # (Resolved 2026-07-05, was ambiguous.) The reference's
  # generate_multistep_scenarios never re-masks: the model's own dense
  # prediction is appended directly to the sliding context window for the
  # next rollout step, with the (unchanged) elevation/sensor-mask channels
  # re-attached. rollout_remask=true (re-injecting noise at non-sensor
  # positions of the model's own last prediction before reusing it as
  # context) was this repo's own interpretation under paper ambiguity; it is
  # not what the reference code does.
  rollout_remask: false
  clip_x0: false
  metrics: [nrmse, nacrps, rmse, mae]

scientific:
  status: diff_sparse_v1_floodcastbench
  does_not_claim:
    - official FloodCastBench benchmark performance
    - official DIFF-SPARSE TideWatch reproduction
    - superiority over persistence or FNO+ until evaluated
    - uncertainty calibration
