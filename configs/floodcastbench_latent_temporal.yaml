experiment:
  name: floodcastbench_latent_temporal
  seed: 42
  output_dir: train_runs

paths:
  # Leave these null on Windows/local clones to preserve repo-relative behavior.
  # On the WSL research workstation, prefer external Linux paths:
  # dataset_root: /home/wissam/datasets/FloodCastBench
  # experiment_root: /home/wissam/experiments/FloodCastBench
  # checkpoint_root: /home/wissam/checkpoints/FloodCastBench
  # log_root: /home/wissam/logs/FloodCastBench
  dataset_root: null
  experiment_root: null
  checkpoint_root: null
  log_root: null

dataset:
  name: floodcastbench
  task: water_depth_forecasting
  root: data/FloodCastBench
  event: australia
  fidelity: high
  resolution: 30m
  input_window: 5
  horizon: 20
  split_ratios:
    train: 0.70
    val: 0.15
    test: 0.15
  normalization:
    mode: standard
    stats_path: outputs/floodcastbench_normalization/water_depth_australia_30m_train_input5_h20_stats.json

loader:
  batch_size: 2
  num_workers: 2
  pin_memory: true

model:
  name: flood_latent_temporal
  input_window: 5
  base_channels: 16
  latent_channels: 64
  temporal_module: temporal_conv
  residual_prediction: true
  output_activation: identity
  final_bias_init: null

training:
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.00001
  loss: mse
  device: auto
  save_best: true
  early_stopping_patience: 15

evaluation:
  gammas: [0.001, 0.01]
  evaluate_test_after_training: true
