dataset:
  augmentation: true
  context_length: 24
  covariate_time_scale: 864000.0
  eval_stride: 20
  event: uk
  fidelity: high
  include_covariates: true
  include_dem: true
  include_rainfall: true
  name: floodcastbench
  patch_size: 64
  prediction_length: 12
  resolution: 60m
  split_counts:
    test: 4
    train: 35
    val: 4
  task: diff_sparse_v2_autoregressive
  train_stride: 1
diffusion:
  beta_end: 1.0
  beta_schedule: linear
  beta_start: 0.0001
  prediction_type: x0
  steps: 40
evaluation:
  clip_x0_physical: true
  metrics:
  - nrmse
  - nacrps
  - rmse
  - mae
  - path_iou
  - propagation_path_iou
  num_scenarios_test: 8
  num_scenarios_val: 2
  rollout_remask: false
  use_ema: true
experiment:
  name: fcb_diff_sparse_v2_uk_seed7_highfid_60m
  seed: 7
loader:
  batch_size: 32
  num_workers: 4
  pin_memory: true
loss:
  change_weight: 3.0
  snr_gamma: null
  snr_weight_floor: 0.05
masking:
  eval_mask_bank_size: 10
  eval_mask_seed: 1234
  mask_mode: noise
  missing_rate: 0.0
  missing_rate_range: null
model:
  context_conv_channels:
  - 16
  - 32
  - 64
  context_embedding_dim: 64
  context_groupnorm_groups: 8
  cross_attention_blocks: 2
  dropout: 0.0
  groupnorm_groups: 16
  include_context_deltas: true
  include_target_rainfall: true
  name: diff_sparse_v2
  resnet_layers_per_block: 2
  spatial_context_channels: 16
  spatial_context_hidden_channels: 32
  unet_channels:
  - 32
  - 64
  - 64
  - 128
normalization:
  fit_split: train
  method: standardization
  min_std: 1.0e-06
paths:
  checkpoint_root: /home/wissam/utem-workspace/checkpoints/FloodCastBench
  dataset_root: /home/wissam/utem-workspace/data/FloodCastBench
  experiment_root: /home/wissam/utem-workspace/experiments/FloodCastBench
  log_root: /home/wissam/utem-workspace/logs/FloodCastBench
prediction:
  delta_stats_json: outputs/floodcastbench_normalization/diff_sparse_v2_uk_delta_stats.json
  target: delta
  wet_threshold_m: 0.001
scientific:
  does_not_claim:
  - official FloodCastBench benchmark performance
  - official DIFF-SPARSE TideWatch reproduction
  - superiority over persistence, FNO+, or DIFF-SPARSE v1 until evaluated
  - uncertainty calibration
  status: diff_sparse_v2_floodcastbench
training:
  amp: bf16
  consistency_loss_weight: 0.0
  device: auto
  early_stop_patience: 60
  ema_decay: 0.999
  epochs: 300
  grad_clip_norm: 1.0
  learning_rate: 0.001
  lr_factor: 0.5
  lr_patience: 15
  lr_policy: reduce_on_plateau
  pushforward_fraction: 0.25
  pushforward_warmup_epochs: 10
  rollout_val_every: 5
  rollout_val_tiles_per_window: 4
  rollout_val_windows: 2
  seed: 7
  selection_metric: rollout_val_rmse
  val_seed: 1234
  weight_decay: 0.0
