# Deterministic twin of DIFF-SPARSE V2 (paper master plan WP1) -- THE control
# for the paper's central question. Identical architecture and parameter count
# (same encoders, same UNet; noise input fixed to zeros, timestep to 0),
# plain weighted regression on the same regime-aware delta target, same EMA /
# pushforward / clamps / budget / checkpoint selection. The only difference
# from the V2 config: model.name and num_scenarios=1 (deterministic output).
# Decision criteria are pre-registered in reports/paper_master_plan.md WP1.

experiment:
  name: fcb_det_twin_seed123_highfid_60m
  seed: 123

paths:
  dataset_root: /home/wissam/utem-workspace/data/FloodCastBench
  experiment_root: /home/wissam/utem-workspace/experiments/FloodCastBench
  checkpoint_root: /home/wissam/utem-workspace/checkpoints/FloodCastBench
  log_root: /home/wissam/utem-workspace/logs/FloodCastBench

dataset:
  name: floodcastbench
  task: diff_sparse_v2_autoregressive
  fidelity: high
  event: australia
  resolution: 60m
  context_length: 24     # V1: 12. 2 h of history at 300 s frames; window 36.
  prediction_length: 12
  train_stride: 1        # 2285 sliding train windows at window length 36
  eval_stride: 20        # 13 eligible val / 13 test windows (36-frame windows)
  split_counts:
    train: 116
    val: 14
    test: 14
  patch_size: 64
  include_dem: true
  include_rainfall: true
  include_covariates: true
  covariate_time_scale: 864000.0
  augmentation: true     # dihedral (8 flips/rotations), training samples only;
                         # single-event dataset -> spatial augmentation is the
                         # main regularization available

masking:
  missing_rate: 0.0      # sparsity for this run: 0.0 dense, 0.5, 0.95
  # Optional: uniformly sample a training missing rate per sample, producing
  # one model robust across sparsity levels (extends the paper's "different
  # sensor configurations without retraining" claim to levels). Off by
  # default; evaluation always uses the fixed missing_rate above.
  missing_rate_range: null
  mask_mode: noise
  eval_mask_bank_size: 10
  eval_mask_seed: 1234

normalization:
  fit_split: train
  method: standardization
  min_std: 0.000001

prediction:
  # 'delta': diffuse (next - base)/scale; base = last context frame as
  # observed (true at sensor cells, train-mean fill elsewhere; the model's own
  # dense previous prediction from rollout step 2 onward). 'absolute' = V1
  # behavior. scale comes from delta_stats_json (train frame-difference std).
  target: delta
  delta_stats_json: outputs/floodcastbench_normalization/diff_sparse_v2_delta_stats.json
  wet_threshold_m: 0.001 # gamma used for the change-weight map (matches the
                         # smallest official flood-mask threshold)

model:
  name: deterministic_twin
  # Temporal token encoder (unchanged V1 mechanism, wider embedding).
  context_conv_channels: [16, 32, 64]
  context_embedding_dim: 64             # V1: 32
  context_groupnorm_groups: 8
  # V2 pixel-aligned spatial pathway.
  spatial_context_channels: 16
  spatial_context_hidden_channels: 32
  include_target_rainfall: true
  include_context_deltas: true          # consecutive-frame water differences
                                         # (inundation trend channels)
  # UNet (diffusers.UNet2DConditionModel), ~4x V1's Table 3 capacity.
  unet_channels: [32, 64, 64, 128]
  resnet_layers_per_block: 2
  cross_attention_blocks: 2
  groupnorm_groups: 16
  dropout: 0.0

diffusion:
  steps: 40              # V1 (paper Table 2): 20. Finer reverse process; the
                         # linear-to-1.0 schedule keeps terminal SNR exactly 0.
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 1.0
  prediction_type: x0

loss:
  # Per-pixel emphasis on pixels whose wet/dry state (at wet_threshold_m)
  # changes between base and target -- exactly the propagation-path
  # population. weight = 1 + change_weight at changed pixels, normalized to
  # keep the loss scale comparable. 0 disables.
  change_weight: 3.0
  # Optional Min-SNR-style timestep weighting (x0-adapted, mean-normalized,
  # floored). null = plain MSE (paper). Ablation knob.
  snr_gamma: null
  snr_weight_floor: 0.05

loader:
  batch_size: 32
  num_workers: 4
  pin_memory: true

training:
  epochs: 300
  learning_rate: 0.001
  lr_policy: reduce_on_plateau
  lr_patience: 15        # one-step val_loss drives the LR scheduler only
  lr_factor: 0.5
  weight_decay: 0.0
  grad_clip_norm: 1.0
  amp: bf16              # autocast bf16 on CUDA (training forward/loss only;
                         # sampling and validation math stay fp32-safe)
  ema_decay: 0.999       # EMA of weights; rollout validation + eval use EMA
  # Checkpoint selection: real generative rollout RMSE (absolute space) on a
  # small fixed set of val tiles, EMA weights, every rollout_val_every epochs.
  selection_metric: rollout_val_rmse
  rollout_val_every: 5
  rollout_val_windows: 2
  rollout_val_tiles_per_window: 4
  early_stop_patience: 60
  # Exposure-bias reduction: on this fraction of training batches, roll the
  # model's own (no-grad, one-forward) step-1 prediction into the context and
  # train step 2 against the true frame relative to that imperfect base.
  pushforward_fraction: 0.25
  # Pushforward starts only after this many epochs: an untrained model's
  # step-1 base is garbage and produces synthetic residuals that are pure
  # training noise (and, before the regime-aware scale fix, NaN batches).
  pushforward_warmup_epochs: 10
  # Hydraulic spatial-coherence penalty (reference repo port). Ablation knob.
  consistency_loss_weight: 0.0
  val_seed: 1234
  device: auto
  seed: 123

evaluation:
  num_scenarios_val: 1
  num_scenarios_test: 1
  rollout_remask: false  # matches the reference's generate_multistep_scenarios
  clip_x0_physical: true # clamp absolute depth >= 0 during sampling + outputs
  use_ema: true          # evaluate the EMA weights when present
  metrics: [nrmse, nacrps, rmse, mae, path_iou, propagation_path_iou]

scientific:
  status: deterministic_twin_floodcastbench
  does_not_claim:
    - official FloodCastBench benchmark performance
    - official DIFF-SPARSE TideWatch reproduction
    - superiority over persistence, FNO+, or DIFF-SPARSE v1 until evaluated
    - uncertainty calibration
