# DIFF-SPARSE v1 eval-only long-horizon config, matching FNO+'s full audit
# range. Same trained model contract as
# floodcastbench_diff_sparse_v1_highfid_60m.yaml: context_length stays 12 and
# one-step reverse sampling is rolled out autoregressively. Only
# prediction_length is extended so the last target frame is h216
# (context_length 12 + prediction_length 204 = 216), matching the horizon
# reached by FNO+'s long-horizon rollout tool.
#
# Eligibility: the val/test frame ranges (~280-281 frames each) cannot fit
# every canonical stride-20 window at a 216-frame window length. Only windows
# whose full 216-frame span fits inside the split are evaluated (same
# eligibility discipline as the h13..h32 pred20 config) — expect roughly 4
# eligible windows per split instead of the canonical 14, reported by the
# evaluator at run time.
#
# Scientific status: a single-window, single-seed, 2-scenario timing/sanity
# pass (2026-07-05) confirmed the rollout stays numerically bounded through
# h216 — classical_rmse grows smoothly and monotonically (~0.014 at h13 to
# ~0.39 at h216), pred_min/max stay physically plausible, no blow-up or NaN.
# It degrades progressively (as expected for any autoregressive rollout),
# it does not degenerate. The full multi-window, full-scenario run below is
# the first real result at this horizon.

experiment:
  name: fcb_diff_sparse_v1_highfid_60m_h216
  seed: 42

paths:
  dataset_root: /home/wissam/utem-workspace/data/FloodCastBench
  experiment_root: /home/wissam/utem-workspace/experiments/FloodCastBench
  checkpoint_root: /home/wissam/utem-workspace/checkpoints/FloodCastBench
  log_root: /home/wissam/utem-workspace/logs/FloodCastBench

dataset:
  name: floodcastbench
  task: diff_sparse_v1_autoregressive_eval_h216
  fidelity: high
  event: australia
  resolution: 60m
  context_length: 12
  prediction_length: 204
  train_stride: 1
  eval_stride: 20
  split_counts:
    train: 116
    val: 14
    test: 14
  patch_size: 64
  include_dem: true
  include_rainfall: true
  include_covariates: true
  covariate_time_scale: 864000.0

masking:
  missing_rate: 0.0
  mask_mode: noise
  eval_mask_bank_size: 10
  eval_mask_seed: 1234

normalization:
  fit_split: train
  method: standardization
  min_std: 0.000001

model:
  name: diff_sparse_v1
  context_conv_channels: [16, 32, 64]
  context_embedding_dim: 32
  covariate_dim: 16
  unet_channels: [16, 32, 32, 64]
  resnet_layers_per_block: 2
  cross_attention_blocks: 2
  attention_heads: 4
  groupnorm_groups: 8
  time_embedding_dim: 128
  conditioning: cross_attention_concat

diffusion:
  steps: 20
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 1.0
  prediction_type: x0

loader:
  batch_size: 32
  num_workers: 4
  pin_memory: true

training:
  epochs: 161
  learning_rate: 0.001
  lr_policy: reduce_on_plateau
  lr_patience: 3
  lr_factor: 0.5
  weight_decay: 0.0
  grad_clip_norm: 1.0
  selection_metric: val_loss
  val_seed: 1234
  device: auto
  seed: 42

evaluation:
  num_scenarios_val: 2
  num_scenarios_test: 8   # matches the native h13..h20 protocol; a single
                          # timed window (2 scenarios, ~8m40s) confirmed the
                          # rollout stays numerically bounded through h216
                          # and the cost is affordable at 4 eligible windows,
                          # so the full 8-scenario test protocol is kept.
  rollout_remask: true
  clip_x0: false
  metrics: [nrmse, nacrps, rmse, mae]

scientific:
  status: diff_sparse_v1_floodcastbench_eval_only_h216
  does_not_claim:
    - official FloodCastBench benchmark performance
    - official DIFF-SPARSE TideWatch reproduction
    - superiority over persistence or FNO+ until evaluated
    - uncertainty calibration
    - rollout stability past the first ~50 cumulative steps until inspected
