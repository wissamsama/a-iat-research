experiment:
  name: fcb_diff_sparse_dense_missing0_highfid_60m
  seed: 42

paths:
  dataset_root: /home/wissam/utem-workspace/data/FloodCastBench
  experiment_root: /home/wissam/utem-workspace/experiments/FloodCastBench
  checkpoint_root: /home/wissam/utem-workspace/checkpoints/FloodCastBench
  log_root: /home/wissam/utem-workspace/logs/FloodCastBench

dataset:
  name: floodcastbench
  task: diff_sparse_dense_one_step
  fidelity: high
  event: australia
  resolution: 60m
  sample_length: 20
  stride: 20
  target_step: 1
  split_counts:
    train: 116
    val: 14
    test: 14

normalization:
  fit_split: train
  method: standardization
  reuse_official_v1: true
  min_std: 0.000001

masking:
  missing_rate: 0.0
  mask_mode: all_ones

model:
  name: diff_sparse_dense
  context_channels: 6
  target_channels: 1
  input_timesteps: 20
  use_dem: true
  use_rain: true
  use_coords: true
  use_time: true
  base_channels: 32
  channel_mults: [1, 2, 4]
  conditioning: concat

diffusion:
  steps: 20
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 0.02
  prediction_type: x0

loader:
  batch_size: 1
  num_workers: 2
  pin_memory: true

training:
  epochs: 1
  learning_rate: 0.0001
  weight_decay: 0.00001
  loss: mse_x0
  selection_metric: val_loss
  device: auto
  seed: 42
  grad_clip_norm: 1.0

evaluation:
  metric_units: normalized_for_initial_sanity
  gammas: [0.001, 0.01]
  num_samples: 1
